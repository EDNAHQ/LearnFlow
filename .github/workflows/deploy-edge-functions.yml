name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify secrets are configured
        run: |
          if [ -z "${{ secrets.SUPABASE_PROJECT_REF }}" ] || [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "::error::Missing required secrets. Please add SUPABASE_PROJECT_REF and SUPABASE_ACCESS_TOKEN in Settings > Secrets and variables > Actions"
            exit 1
          fi

      - name: Deploy all Edge Functions
        run: |
          for dir in supabase/functions/*/; do
            func_name=$(basename "$dir")
            if [ "$func_name" = "_shared" ]; then
              continue
            fi
            echo "Deploying $func_name..."
            supabase functions deploy "$func_name" --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" --no-verify-jwt
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
